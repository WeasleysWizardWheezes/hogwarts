name: Setup Frontend Dependencies
description: Install frontend dependencies with GitHub Packages registry auth

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node

    - name: Install Frontend Dependencies
      working-directory: frontend
      shell: bash
      run: |
        WANTED_VERSION=$(node -p "require('./package.json').dependencies['@weasleyswizardwheezes/hogwarts-api-client']")
        echo "Geforderte API-Version laut package.json: $WANTED_VERSION"
        npm install "@weasleyswizardwheezes/hogwarts-api-client@$WANTED_VERSION" --package-lock-only --legacy-peer-deps
        npm ci --legacy-peer-deps
      env:
        NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

