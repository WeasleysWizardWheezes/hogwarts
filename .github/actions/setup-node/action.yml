name: Setup Node.js
description: Setup Node.js with npm cache and GitHub Packages registry auth

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configure .npmrc for Frontend project
      shell: bash
      run: |
        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        
        cat <<EOF > .npmrc
        @${OWNER_LOWER}:registry=https://npm.pkg.github.com
        //npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}
        EOF
        
        if [ -d "frontend" ]; then
          cp .npmrc frontend/.npmrc
          echo "Erfolgreich frontend/.npmrc erstellt"
        fi