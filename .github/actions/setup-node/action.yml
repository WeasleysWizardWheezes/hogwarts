name: Setup Node.js
description: Setup Node.js with npm cache and GitHub Packages registry auth

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://npm.pkg.github.com'

    - name: Configure .npmrc with lowercase scope
      shell: bash
      run: |
        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
      
        echo "@${OWNER_LOWER}:registry=https://npm.pkg.github.com" >> $NPM_CONFIG_USERCONFIG
        echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> $NPM_CONFIG_USERCONFIG