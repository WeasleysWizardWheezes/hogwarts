name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feat/**", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: firemanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run Checkstyle
      run: mvn checkstyle:check

    - name: Run Unit Tests
      run: mvn test

    - name: Run Integration Tests
      run: mvn verify

    - name: Build Docker Image
      run: docker build -t firemanager .

    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Push Docker Image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag firemanager ${{ secrets.DOCKER_HUB_USERNAME }}/firemanager:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/firemanager:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to Production
      run: |
        echo "Deploying to production..."
        # Hier würde der eigentliche Deployment-Prozess stehen
        # z.B. Kubernetes, Docker Swarm, etc.
