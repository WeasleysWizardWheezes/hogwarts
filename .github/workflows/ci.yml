name: CICD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'oracle'

jobs:
  # ═══════════════════════════════════════════════
  # Stage 1: Backend – Unit Tests + Coverage
  # ═══════════════════════════════════════════════
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run Unit Tests
        working-directory: backend
        run: chmod +x mvnw && ./mvnw test --batch-mode --no-transfer-progress

      - name: Upload target directory
        uses: actions/upload-artifact@v7
        with:
          name: backend-target
          path: backend/target/
          retention-days: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 2a: Frontend – Lint + Build
  # ═══════════════════════════════════════════════
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Build (TypeScript + Vite)
        working-directory: frontend
        run: npm run build

  # ═══════════════════════════════════════════════
  # Stage 2b: Frontend – Unit Tests (Vitest)
  # ═══════════════════════════════════════════════
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests with Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 2c: Frontend – E2E Tests (Playwright)
  # ═══════════════════════════════════════════════
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Test Traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-traces
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 3: Quality (Checkstyle + JaCoCo + PITest)
  # ═══════════════════════════════════════════════
  quality:
    name: Code Quality (Checkstyle + JaCoCo)
    runs-on: ubuntu-latest
    needs: test
    # TODO: Remove continue-on-error once real tests achieve 80% coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Download target from test job
        uses: actions/download-artifact@v8
        with:
          name: backend-target
          path: backend/target/

      - name: Verify Quality Gates (Checkstyle + JaCoCo)
        working-directory: backend
        run: chmod +x mvnw && ./mvnw verify -DskipTests --batch-mode --no-transfer-progress

      - name: Upload Checkstyle Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-report
          path: backend/target/checkstyle-result.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  mutation-testing:
    name: Mutation Testing (PITest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run PITest
        working-directory: backend
        run: chmod +x mvnw && ./mvnw pitest:mutationCoverage --batch-mode --no-transfer-progress

      - name: Check Mutation Score Threshold
        working-directory: backend
        run: |
          REPORT=$(find target/pit-reports -name "mutations.xml" -type f | head -1)

          if [ -z "$REPORT" ]; then
            echo "::error::PITest report not found"
            exit 1
          fi

          TOTAL=$(grep -c '<mutation ' "$REPORT" || echo 0)
          KILLED=$(grep -c 'status="KILLED"' "$REPORT" || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No mutations generated"
            exit 0
          fi

          SCORE=$((KILLED * 100 / TOTAL))
          echo "Mutation Score: $SCORE% ($KILLED/$TOTAL killed)"

          if [ "$SCORE" -lt 70 ]; then
            echo "::error::Mutation Score $SCORE% is below threshold of 70%"
            exit 1
          fi

      - name: Upload PITest Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report
          path: backend/target/pit-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 4: E2E Tests (Testcontainers)
  # ═══════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run E2E Tests (Testcontainers)
        working-directory: backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: |
          chmod +x mvnw
          ./mvnw verify -Dsurefire.skip=true --batch-mode --no-transfer-progress

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: backend/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 5: Security Scan (CodeQL)
  # ═══════════════════════════════════════════════
  security-scan-backend:
    name: Security Scan – Backend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build for CodeQL
        working-directory: backend
        run: chmod +x mvnw && ./mvnw compile --batch-mode --no-transfer-progress -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-frontend:
    name: Security Scan – Frontend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          source-root: frontend/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ═══════════════════════════════════════════════
  # Stage 6: Package (Docker Image)
  # ═══════════════════════════════════════════════
  package:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [quality, e2e-tests, frontend, frontend-test, frontend-e2e]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Spring Boot Image
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository }}:latest \
            -Dspring-boot.build-image.publish=true \
            -Ddocker.publishRegistry.username=${{ github.actor }} \
            -Ddocker.publishRegistry.password=${{ secrets.GITHUB_TOKEN }} \
            -Ddocker.publishRegistry.url=ghcr.io \
            -DskipTests \
            --batch-mode --no-transfer-progress