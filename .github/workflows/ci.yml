name: CICD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  issues: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'oracle'

jobs:
  # ═══════════════════════════════════════════════
  # Stage 1: Backend – Unit Tests + Coverage
  # ═══════════════════════════════════════════════
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run Unit Tests
        working-directory: backend
        run: chmod +x mvnw && ./mvnw test --batch-mode --no-transfer-progress

      - name: Upload target directory
        uses: actions/upload-artifact@v7
        with:
          name: backend-target
          path: backend/target/
          retention-days: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 1b: OpenAPI Schema Sync
  # ═══════════════════════════════════════════════
  openapi-sync:
    name: Sync OpenAPI Schema
    runs-on: ubuntu-latest
    needs: test
    # TODO: Temporarily disabled – re-enable when needed
    if: false # github.event_name == 'pull_request'
    concurrency:
      group: openapi-sync-${{ github.head_ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 50

      - name: Check for backend changes
        id: changes
        run: |
          git fetch origin main --depth=1
          if git diff --name-only origin/main...HEAD | grep -q '^backend/src/main/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Generate OpenAPI Spec
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw verify -P openapi-generate -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Node.js
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Generate TypeScript Types
        if: steps.changes.outputs.backend == 'true'
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          cp ../backend/target/openapi.json src/shared/api/schema.json
          npx openapi-typescript src/shared/api/schema.json -o src/shared/api/schema.d.ts

      - name: Commit if changed
        if: steps.changes.outputs.backend == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/shared/api/schema.json frontend/src/shared/api/schema.d.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync OpenAPI schema"
            git stash --include-untracked
            git pull --rebase
            git stash pop || true
            git push
          fi

  # ═══════════════════════════════════════════════
  # Stage 2a: Frontend – Lint + Build
  # ═══════════════════════════════════════════════
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Build (TypeScript + Vite)
        working-directory: frontend
        run: npm run build

  # ═══════════════════════════════════════════════
  # Stage 2b: Frontend – Unit Tests (Vitest)
  # ═══════════════════════════════════════════════
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests with Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 2c: Frontend – E2E Tests (Playwright)
  # ═══════════════════════════════════════════════
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Test Traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-traces
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 3: Quality (Checkstyle + JaCoCo + PITest)
  # ═══════════════════════════════════════════════
  quality:
    name: Code Quality (Checkstyle + JaCoCo)
    runs-on: ubuntu-latest
    needs: test
    # TODO: Remove continue-on-error once real tests achieve 80% coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Download target from test job
        uses: actions/download-artifact@v8
        with:
          name: backend-target
          path: backend/target/

      - name: Verify Quality Gates (Checkstyle + JaCoCo)
        working-directory: backend
        run: chmod +x mvnw && ./mvnw verify -DskipTests --batch-mode --no-transfer-progress

      - name: Upload Checkstyle Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-report
          path: backend/target/checkstyle-result.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  mutation-testing:
    name: Mutation Testing (PITest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run PITest
        working-directory: backend
        run: chmod +x mvnw && ./mvnw pitest:mutationCoverage --batch-mode --no-transfer-progress

      - name: Check Mutation Score Threshold
        working-directory: backend
        run: |
          REPORT=$(find target/pit-reports -name "mutations.xml" -type f 2>/dev/null | head -1)

          if [ -z "$REPORT" ]; then
            echo "::warning::PITest report not found – no mutations generated"
            exit 0
          fi

          TOTAL=$(grep -c '<mutation ' "$REPORT" || echo 0)
          KILLED=$(grep -c 'status="KILLED"' "$REPORT" || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No mutations generated"
            exit 0
          fi

          SCORE=$((KILLED * 100 / TOTAL))
          echo "Mutation Score: $SCORE% ($KILLED/$TOTAL killed)"

          if [ "$SCORE" -lt 70 ]; then
            echo "::error::Mutation Score $SCORE% is below threshold of 70%"
            exit 1
          fi

      - name: Upload PITest Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report
          path: backend/target/pit-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 4: E2E Tests (Testcontainers)
  # ═══════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run E2E Tests (Testcontainers)
        working-directory: backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: |
          chmod +x mvnw
          ./mvnw verify -Dsurefire.skip=true --batch-mode --no-transfer-progress

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: backend/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 5: Security Scan (CodeQL)
  # ═══════════════════════════════════════════════
  security-scan-backend:
    name: Security Scan – Backend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build for CodeQL
        working-directory: backend
        run: chmod +x mvnw && ./mvnw compile --batch-mode --no-transfer-progress -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-frontend:
    name: Security Scan – Frontend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          source-root: frontend/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ═══════════════════════════════════════════════
  # Stage 6: Package (Docker Images)
  # ═══════════════════════════════════════════════
  package-backend:
    name: Package – Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [quality, e2e-tests]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Spring Boot Image
        working-directory: backend
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/firemanager-backend
        run: |
          chmod +x mvnw
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${IMAGE_NAME,,}:latest \
            -Dspring-boot.build-image.publish=true \
            -Ddocker.publishRegistry.username=${{ github.actor }} \
            -Ddocker.publishRegistry.password=${{ secrets.GITHUB_TOKEN }} \
            -Ddocker.publishRegistry.url=ghcr.io \
            -DskipTests \
            --batch-mode --no-transfer-progress

  package-frontend:
    name: Package – Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [frontend, frontend-test, frontend-e2e]
    steps:
      - uses: actions/checkout@v7

      - name: Prepare image metadata
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/firemanager-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════
  # Final Stage: Board Automation
  # ═══════════════════════════════════════════════
  board-automation:
    name: Board Automation
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref_name != 'main'
    needs:
      - test
      - frontend
      - frontend-test
      - frontend-e2e
      - quality
      - e2e-tests
      - security-scan-backend
      - security-scan-frontend
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Extract issue number from branch
        id: issue
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" =~ ^[a-z]+/([0-9]+)- ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Found issue #${BASH_REMATCH[1]} from branch $BRANCH"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "No issue number found in branch: $BRANCH"
          fi

      - name: Check for awaiting-pipeline label
        if: steps.issue.outputs.number != ''
        id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh issue view ${{ steps.issue.outputs.number }} --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "awaiting-pipeline"; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "Issue #${{ steps.issue.outputs.number }} does not have awaiting-pipeline label – skipping"
          fi

      - name: Determine changed paths
        if: steps.label.outputs.has_label == 'true'
        id: paths
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BACKEND_MAIN=false
          BACKEND_TEST=false
          FRONTEND_MAIN=false
          FRONTEND_TEST=false

          while IFS= read -r file; do
            if [[ "$file" == backend/src/main/* ]]; then
              BACKEND_MAIN=true
            elif [[ "$file" == backend/src/test/* ]]; then
              BACKEND_TEST=true
            elif [[ "$file" == frontend/e2e/* ]] || [[ "$file" == frontend/src/test/* ]] || [[ "$file" == *.test.* ]] || [[ "$file" == *.spec.* ]]; then
              FRONTEND_TEST=true
            elif [[ "$file" == frontend/src/* ]]; then
              FRONTEND_MAIN=true
            fi
          done <<< "$CHANGED"

          # Determine role: testers take priority if test files changed
          if [[ "$BACKEND_TEST" == "true" ]]; then
            echo "role=backend-tester" >> "$GITHUB_OUTPUT"
            echo "current_column=Test" >> "$GITHUB_OUTPUT"
            echo "target_column=Needs Review" >> "$GITHUB_OUTPUT"
          elif [[ "$FRONTEND_TEST" == "true" ]]; then
            echo "role=frontend-tester" >> "$GITHUB_OUTPUT"
            echo "current_column=Test" >> "$GITHUB_OUTPUT"
            echo "target_column=Needs Review" >> "$GITHUB_OUTPUT"
          elif [[ "$BACKEND_MAIN" == "true" ]]; then
            echo "role=backend-dev" >> "$GITHUB_OUTPUT"
            echo "current_column=Dev" >> "$GITHUB_OUTPUT"
            echo "target_column=Ready Test" >> "$GITHUB_OUTPUT"
          elif [[ "$FRONTEND_MAIN" == "true" ]]; then
            echo "role=frontend-dev" >> "$GITHUB_OUTPUT"
            echo "current_column=Dev" >> "$GITHUB_OUTPUT"
            echo "target_column=Ready Test" >> "$GITHUB_OUTPUT"
          else
            echo "role=" >> "$GITHUB_OUTPUT"
            echo "No relevant path changes detected"
          fi

      - name: Determine pipeline result
        if: steps.paths.outputs.role != ''
        id: result
        run: |
          # Check if all relevant jobs succeeded
          FAILED=false

          # Backend roles: check backend-relevant jobs
          if [[ "${{ steps.paths.outputs.role }}" == backend-* ]]; then
            if [[ "${{ needs.test.result }}" != "success" ]] || \
               [[ "${{ needs.quality.result }}" != "success" ]] || \
               [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
              FAILED=true
            fi
          fi

          # Frontend roles: check frontend-relevant jobs
          if [[ "${{ steps.paths.outputs.role }}" == frontend-* ]]; then
            if [[ "${{ needs.frontend.result }}" != "success" ]] || \
               [[ "${{ needs.frontend-test.result }}" != "success" ]] || \
               [[ "${{ needs.frontend-e2e.result }}" != "success" ]]; then
              FAILED=true
            fi
          fi

          # Security scans are relevant for all
          if [[ "${{ needs.security-scan-backend.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan-frontend.result }}" != "success" ]]; then
            FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "Pipeline FAILED for role ${{ steps.paths.outputs.role }}"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "Pipeline SUCCEEDED for role ${{ steps.paths.outputs.role }}"
          fi

      - name: Remove awaiting-pipeline label
        if: steps.paths.outputs.role != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ steps.issue.outputs.number }} --remove-label "awaiting-pipeline"
          echo "Removed awaiting-pipeline label from issue #${{ steps.issue.outputs.number }}"

      - name: Move issue on project board
        if: steps.result.outputs.status == 'success' && steps.paths.outputs.role != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          ORG="WeasleysWizardWheezes"
          PROJECT_NUMBER=1
          ISSUE_NUMBER=${{ steps.issue.outputs.number }}
          TARGET_STATUS="${{ steps.paths.outputs.target_column }}"

          # Get project ID
          PROJECT_ID=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                }
              }
            }' -f org="$ORG" -F number=$PROJECT_NUMBER --jq '.data.organization.projectV2.id')

          echo "Project ID: $PROJECT_ID"

          # Get the issue node ID
          REPO="${{ github.repository }}"
          ISSUE_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) {
                  id
                }
              }
            }' -f owner="$ORG" -f repo="${REPO#*/}" -F number=$ISSUE_NUMBER --jq '.data.repository.issue.id')

          echo "Issue ID: $ISSUE_ID"

          # Get the project item ID for this issue
          ITEM_ID=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.number == $ISSUE_NUMBER) | .id")

          echo "Item ID: $ITEM_ID"

          # Get the Status field ID and target option ID
          FIELD_DATA=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -f projectId="$PROJECT_ID")

          STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')
          OPTION_ID=$(echo "$FIELD_DATA" | jq -r ".data.node.fields.nodes[] | select(.name == \"Status\") | .options[] | select(.name == \"$TARGET_STATUS\") | .id")

          echo "Status Field ID: $STATUS_FIELD_ID"
          echo "Target Option ID: $OPTION_ID (for status: $TARGET_STATUS)"

          # Update the item status
          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item {
                  id
                }
              }
            }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f optionId="$OPTION_ID"

          echo "✅ Moved issue #$ISSUE_NUMBER to '$TARGET_STATUS'"

  # ═══════════════════════════════════════════════
  # Sonderfall: PR Merge → Done + Unblock
  # ═══════════════════════════════════════════════
  board-automation-merge:
    name: Board Automation (PR Merge)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v7

      - name: Extract closed issue numbers from PR body
        id: issues
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Extract issue numbers from "Closes #<nr>" patterns
          NUMBERS=$(echo "$PR_BODY" | grep -oiP '(?:closes|fixes|resolves)\s+#\K[0-9]+' || true)
          echo "numbers<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NUMBERS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found issues: $NUMBERS"

      - name: Move issues to Done and unblock dependents
        if: steps.issues.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          ORG="WeasleysWizardWheezes"
          PROJECT_NUMBER=1
          REPO="${{ github.repository }}"

          # Get project ID
          PROJECT_ID=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                }
              }
            }' -f org="$ORG" -F number=$PROJECT_NUMBER --jq '.data.organization.projectV2.id')

          # Get Status field and option IDs
          FIELD_DATA=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -f projectId="$PROJECT_ID")

          STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')
          DONE_OPTION_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "Done") | .id')
          READY_DEV_OPTION_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "Ready Dev") | .id')

          while IFS= read -r ISSUE_NUMBER; do
            [ -z "$ISSUE_NUMBER" ] && continue
            echo "Processing issue #$ISSUE_NUMBER..."

            # Get item ID on project board
            ITEM_ID=$(gh api graphql -f query='
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.number == $ISSUE_NUMBER) | .id")

            if [ -z "$ITEM_ID" ]; then
              echo "Issue #$ISSUE_NUMBER not found on project board – skipping"
              continue
            fi

            # Move to Done
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f optionId="$DONE_OPTION_ID"

            echo "✅ Moved issue #$ISSUE_NUMBER to 'Done'"

            # Find dependent issues that reference "waiting on issue #<nr>"
            REPO_NAME="${REPO#*/}"
            DEPENDENTS=$(gh api "repos/$ORG/$REPO_NAME/issues?state=open&per_page=100" --jq ".[].number")

            for DEP_NUMBER in $DEPENDENTS; do
              DEP_BODY=$(gh api "repos/$ORG/$REPO_NAME/issues/$DEP_NUMBER" --jq '.body // ""')

              if echo "$DEP_BODY" | grep -qi "waiting on issue #$ISSUE_NUMBER"; then
                echo "Found dependent issue #$DEP_NUMBER – unblocking..."

                # Remove blocked label if present
                gh issue edit "$DEP_NUMBER" --remove-label "blocked" 2>/dev/null || true

                # Move to Ready Dev on project board
                DEP_ITEM_ID=$(gh api graphql -f query='
                  query($projectId: ID!) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }' -f projectId="$PROJECT_ID" --jq ".data.node.items.nodes[] | select(.content.number == $DEP_NUMBER) | .id")

                if [ -n "$DEP_ITEM_ID" ]; then
                  gh api graphql -f query='
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item { id }
                      }
                    }' -f projectId="$PROJECT_ID" -f itemId="$DEP_ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f optionId="$READY_DEV_OPTION_ID"

                  echo "✅ Moved dependent issue #$DEP_NUMBER to 'Ready Dev'"
                fi
              fi
            done
          done <<< "${{ steps.issues.outputs.numbers }}"
