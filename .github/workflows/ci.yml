name: CICD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'oracle'

jobs:
  # ═══════════════════════════════════════════════
  # Stage 0: Detect Changes (paths-filter)
  # ═══════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.filter.outputs.openapi }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            openapi:
              - 'openapi/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ═══════════════════════════════════════════════
  # Stage 0.5: OpenAPI – Validate + Generate + Publish
  # ═══════════════════════════════════════════════
  openapi-validate:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.openapi == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-openapi

      - name: Validate OpenAPI Spec
        run: openapi-generator-cli validate -i openapi/api.yaml

  openapi-publish-backend:
    name: OpenAPI Publish Backend (Java/Spring)
    runs-on: ubuntu-latest
    needs: openapi-validate
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from OpenAPI Spec
        id: issue
        run: |
          # yq liest den Pfad .info.version aus deiner api.yaml
          VERSION=$(yq eval '.info.version' openapi/api.yaml)
          echo "Version aus OpenAPI ermittelt: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-openapi
      - uses: ./.github/actions/setup-java

      - name: Generate Backend API Lib (Java/Spring)
        run: |
          openapi-generator-cli generate \
            -i openapi/api.yaml \
            -g spring \
            -o generated/backend-api \
            --additional-properties=interfaceOnly=true,useSpringBoot3=true,useTags=true,artifactId=hogwarts-api-client \
            --artifact-version=${{ steps.issue.outputs.version }}

      - name: Publish Backend API Lib to GitHub Packages
        working-directory: generated/backend-api
        run: |
          mvn deploy \
            -s ${{ github.workspace }}/settings.xml \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -Dmaven.deploy.skip=false \
            -DskipTests \
            --batch-mode --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  openapi-publish-frontend:
    name: OpenAPI Publish Frontend (TS Types)
    runs-on: ubuntu-latest
    needs: openapi-validate
    steps:
      - uses: actions/checkout@v7

      - name: Extract and format version for Frontend
        id: issue
        run: |
          RAW_VERSION=$(yq eval '.info.version' openapi/api.yaml)
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/-SNAPSHOT//g')
          FINAL_VERSION="${CLEAN_VERSION}-build${{ github.run_number }}"
          
          echo "Formatierte Frontend-Version: $FINAL_VERSION"
          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-node

      - name: Generate Frontend TS Types (openapi-typescript)
        run: |
          mkdir -p generated/frontend-api
          npx openapi-typescript openapi/api.yaml -o generated/frontend-api/schema.d.ts

      - name: Publish Frontend API Client to GitHub Packages
        working-directory: generated/frontend-api
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          cat <<EOF > package.json
          {
            "name": "@${OWNER_LOWER}/hogwarts-api-client",
            "version": "${{ steps.issue.outputs.version }}",
            "main": "schema.d.ts",
            "types": "schema.d.ts"
          }
          EOF
          
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # Stage 1: Backend – Unit Tests + Coverage
  # ═══════════════════════════════════════════════
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-java

      - name: Run Unit Tests
        working-directory: backend
        run: chmod +x mvnw && ./mvnw test --batch-mode --no-transfer-progress

      - name: Upload target directory
        uses: actions/upload-artifact@v7
        with:
          name: backend-target
          path: backend/target/
          retention-days: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 1b: OpenAPI Schema Sync
  # ═══════════════════════════════════════════════
  openapi-sync:
    name: Sync OpenAPI Schema
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    concurrency:
      group: openapi-sync-${{ github.head_ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 50

      - name: Check for backend changes
        id: changes
        run: |
          git fetch origin main --depth=1
          if git diff --name-only origin/main...HEAD | grep -q '^backend/src/main/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Generate OpenAPI Spec
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw verify -P openapi-generate -DskipTests --batch-mode --no-transfer-progress

      - name: Set up Node.js
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Generate TypeScript Types
        if: steps.changes.outputs.backend == 'true'
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          cp ../backend/target/openapi.json src/shared/api/schema.json
          npx openapi-typescript src/shared/api/schema.json -o src/shared/api/schema.d.ts

      - name: Commit if changed
        if: steps.changes.outputs.backend == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/shared/api/schema.json frontend/src/shared/api/schema.d.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync OpenAPI schema"
            git stash --include-untracked
            git pull --rebase
            git stash pop || true
            git push
          fi

  # ═══════════════════════════════════════════════
  # Stage 2a: Frontend – Lint + Build
  # ═══════════════════════════════════════════════
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Build (TypeScript + Vite)
        working-directory: frontend
        run: npm run build

  # ═══════════════════════════════════════════════
  # Stage 2b: Frontend – Unit Tests (Vitest)
  # ═══════════════════════════════════════════════
  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests with Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 2c: Frontend – E2E Tests (Playwright)
  # ═══════════════════════════════════════════════
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Test Traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-e2e-traces
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 3: Quality (Checkstyle + JaCoCo + PITest)
  # ═══════════════════════════════════════════════
  quality:
    name: Code Quality (Checkstyle + JaCoCo)
    runs-on: ubuntu-latest
    needs: test
    # TODO: Remove continue-on-error once real tests achieve 80% coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Download target from test job
        uses: actions/download-artifact@v8
        with:
          name: backend-target
          path: backend/target/

      - name: Verify Quality Gates (Checkstyle + JaCoCo)
        working-directory: backend
        run: chmod +x mvnw && ./mvnw verify -DskipTests --batch-mode --no-transfer-progress

      - name: Upload Checkstyle Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-report
          path: backend/target/checkstyle-result.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  mutation-testing:
    name: Mutation Testing (PITest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run PITest
        working-directory: backend
        run: chmod +x mvnw && ./mvnw pitest:mutationCoverage --batch-mode --no-transfer-progress

      - name: Check Mutation Score Threshold
        working-directory: backend
        run: |
          REPORT=$(find target/pit-reports -name "mutations.xml" -type f 2>/dev/null | head -1)

          if [ -z "$REPORT" ]; then
            echo "::warning::PITest report not found – no mutations generated"
            exit 0
          fi

          TOTAL=$(grep -c '<mutation ' "$REPORT" || echo 0)
          KILLED=$(grep -c 'status="KILLED"' "$REPORT" || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No mutations generated"
            exit 0
          fi

          SCORE=$((KILLED * 100 / TOTAL))
          echo "Mutation Score: $SCORE% ($KILLED/$TOTAL killed)"

          if [ "$SCORE" -lt 70 ]; then
            echo "::error::Mutation Score $SCORE% is below threshold of 70%"
            exit 1
          fi

      - name: Upload PITest Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report
          path: backend/target/pit-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 4: E2E Tests (Testcontainers)
  # ═══════════════════════════════════════════════
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run E2E Tests (Testcontainers)
        working-directory: backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: |
          chmod +x mvnw
          ./mvnw verify -Dsurefire.skip=true --batch-mode --no-transfer-progress

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: backend/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════
  # Stage 5: Security Scan (CodeQL)
  # ═══════════════════════════════════════════════
  security-scan-backend:
    name: Security Scan – Backend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build for CodeQL
        working-directory: backend
        run: chmod +x mvnw && ./mvnw compile --batch-mode --no-transfer-progress -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-scan-frontend:
    name: Security Scan – Frontend (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          source-root: frontend/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ═══════════════════════════════════════════════
  # Stage 6: Package (Docker Images)
  # ═══════════════════════════════════════════════
  package-backend:
    name: Package – Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [quality, e2e-tests]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Spring Boot Image
        working-directory: backend
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/firemanager-backend
        run: |
          chmod +x mvnw
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${IMAGE_NAME,,}:latest \
            -Dspring-boot.build-image.publish=true \
            -Ddocker.publishRegistry.username=${{ github.actor }} \
            -Ddocker.publishRegistry.password=${{ secrets.GITHUB_TOKEN }} \
            -Ddocker.publishRegistry.url=ghcr.io \
            -DskipTests \
            --batch-mode --no-transfer-progress

  package-frontend:
    name: Package – Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [frontend, frontend-test, frontend-e2e]
    steps:
      - uses: actions/checkout@v7

      - name: Prepare image metadata
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/firemanager-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max