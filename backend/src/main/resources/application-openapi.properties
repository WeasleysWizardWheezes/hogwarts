# Profile for OpenAPI spec generation (used by springdoc-openapi-maven-plugin)
# Uses Testcontainers PostgreSQL so no external DB is required during spec generation.

spring.datasource.url=jdbc:tc:postgresql:17:///openapi
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
