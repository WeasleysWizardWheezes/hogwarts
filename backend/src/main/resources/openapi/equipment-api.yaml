openapi: 3.0.3
info:
  title: FireManager Equipment API
  description: API for managing fire department equipment and devices
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.firemanager.example.com
    description: Production server
paths:
  /api/v1/equipment/devices:
    get:
      tags:
        - equipment
      summary: Get all devices
      description: Returns a list of all equipment devices
      operationId: getAllDevices
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceDto'
    post:
      tags:
        - equipment
      summary: Create a new device
      description: Creates a new equipment device
      operationId: createDevice
      requestBody:
        description: Device to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDto'
      responses:
        '201':
          description: Device created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDto'
        '400':
          description: Invalid input data
  /api/v1/equipment/devices/{id}:
    get:
      tags:
        - equipment
      summary: Get device by ID
      description: Returns a single device by its ID
      operationId: getDeviceById
      parameters:
        - name: id
          in: path
          description: ID of the device to return
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDto'
        '404':
          description: Device not found
    put:
      tags:
        - equipment
      summary: Update device
      description: Updates an existing device (full update)
      operationId: updateDevice
      parameters:
        - name: id
          in: path
          description: ID of the device to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Updated device data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDto'
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDto'
        '400':
          description: Invalid input data
        '404':
          description: Device not found
    patch:
      tags:
        - equipment
      summary: Partially update device
      description: Partially updates an existing device
      operationId: partialUpdateDevice
      parameters:
        - name: id
          in: path
          description: ID of the device to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Partial device data to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceDto'
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDto'
        '400':
          description: Invalid input data
        '404':
          description: Device not found
    delete:
      tags:
        - equipment
      summary: Delete device
      description: Deletes a device
      operationId: deleteDevice
      parameters:
        - name: id
          in: path
          description: ID of the device to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Device deleted successfully
        '404':
          description: Device not found
  /api/v1/equipment/devices/serial-number/{serialNumber}:
    get:
      tags:
        - equipment
      summary: Get device by serial number
      description: Returns a single device by its serial number
      operationId: getDeviceBySerialNumber
      parameters:
        - name: serialNumber
          in: path
          description: Serial number of the device to return
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDto'
        '404':
          description: Device not found
components:
  schemas:
    DeviceDto:
      type: object
      required:
        - name
        - serialNumber
        - type
        - location
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier of the device
        name:
          type: string
          description: Name of the device
          example: "Atemschutzgerät Dräger PSS 7000"
        serialNumber:
          type: string
          description: Unique serial number of the device
          example: "DRG-2023-0042"
        type:
          type: string
          description: Type/category of the device
          example: "Atemschutz"
        location:
          type: string
          description: Storage location of the device
          example: "Fahrzeug 1, Fach 3"
