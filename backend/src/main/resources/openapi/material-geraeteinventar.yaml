openapi: 3.0.3
info:
  title: Material- und Geräteinventar API
  description: API für die Verwaltung von Material und Geräten der Feuerwehr
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://api.hogwarts-feuerwehr.de/api
    description: Production server
paths:
  /material-geraete:
    get:
      tags:
        - material-geraete
      summary: Liste aller Materialien und Geräte
      description: Gibt eine Liste aller Materialien und Geräte zurück
      operationId: getAllMaterialGeraete
      parameters:
        - name: name
          in: query
          description: Filter nach Name
          required: false
          schema:
            type: string
        - name: seriennummer
          in: query
          description: Filter nach Seriennummer
          required: false
          schema:
            type: string
        - name: lagerort
          in: query
          description: Filter nach Lagerort
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Erfolgreiche Operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaterialGeraet'
        '400':
          description: Ungültige Anfrage
    post:
      tags:
        - material-geraete
      summary: Neues Material oder Gerät erstellen
      description: Erstellt ein neues Material oder Gerät
      operationId: createMaterialGeraet
      requestBody:
        description: Material oder Gerät, das erstellt werden soll
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialGeraet'
        required: true
      responses:
        '201':
          description: Material oder Gerät erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialGeraet'
        '400':
          description: Ungültige Anfrage
  /material-geraete/{id}:
    get:
      tags:
        - material-geraete
      summary: Material oder Gerät nach ID abrufen
      description: Gibt ein Material oder Gerät nach ID zurück
      operationId: getMaterialGeraetById
      parameters:
        - name: id
          in: path
          description: ID des Materials oder Geräts
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Erfolgreiche Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialGeraet'
        '404':
          description: Material oder Gerät nicht gefunden
    put:
      tags:
        - material-geraete
      summary: Material oder Gerät aktualisieren
      description: Aktualisiert ein Material oder Gerät
      operationId: updateMaterialGeraet
      parameters:
        - name: id
          in: path
          description: ID des Materials oder Geräts
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Material oder Gerät, das aktualisiert werden soll
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialGeraet'
        required: true
      responses:
        '200':
          description: Material oder Gerät erfolgreich aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialGeraet'
        '404':
          description: Material oder Gerät nicht gefunden
    delete:
      tags:
        - material-geraete
      summary: Material oder Gerät löschen
      description: Löscht ein Material oder Gerät
      operationId: deleteMaterialGeraet
      parameters:
        - name: id
          in: path
          description: ID des Materials oder Geräts
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Material oder Gerät erfolgreich gelöscht
        '404':
          description: Material oder Gerät nicht gefunden
components:
  schemas:
    MaterialGeraet:
      type: object
      required:
        - name
        - seriennummer
        - typ
        - lagerort
      properties:
        id:
          type: integer
          format: int64
          description: Eindeutige ID des Materials oder Geräts
        name:
          type: string
          description: Name des Materials oder Geräts
          example: "Atemschutzgerät"
        seriennummer:
          type: string
          description: Seriennummer des Materials oder Geräts
          example: "ASG-2023-001"
        typ:
          type: string
          description: Typ des Materials oder Geräts
          example: "Atemschutz"
        lagerort:
          type: string
          description: Lagerort des Materials oder Geräts
          example: "Hauptwache, Raum 102"
        beschreibung:
          type: string
          description: Beschreibung des Materials oder Geräts
          example: "Atemschutzgerät mit Vollmaske"
        anschaffungsdatum:
          type: string
          format: date
          description: Anschaffungsdatum des Materials oder Geräts
          example: "2023-01-15"
        hersteller:
          type: string
          description: Hersteller des Materials oder Geräts
          example: "Dräger"
