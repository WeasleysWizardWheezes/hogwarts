services:
  frontend:
    build:
      context: frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/firemanager
      - SPRING_DATASOURCE_USERNAME=firemanager
      - SPRING_DATASOURCE_PASSWORD=firemanager
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=firemanager
      - POSTGRES_USER=firemanager
      - POSTGRES_PASSWORD=firemanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firemanager"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
