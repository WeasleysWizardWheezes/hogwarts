openapi: 3.0.3
info:
  title: Hogwarts API
  version: 0.2.0-SNAPSHOT
  description: API für standortübergreifende Personalverwaltung
servers:
  - url: http://localhost:8080/api/v1
paths:
  /locations:
    get:
      summary: Alle Standorte abrufen
      operationId: getLocations
      tags:
        - Locations
      responses:
        '200':
          description: Liste aller Standorte
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
    post:
      summary: Neuen Standort erstellen
      operationId: createLocation
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreate'
      responses:
        '201':
          description: Standort erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Ungültige Eingabedaten
  /locations/{id}:
    get:
      summary: Standort nach ID abrufen
      operationId: getLocationById
      tags:
        - Locations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Standort gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          description: Standort nicht gefunden
    put:
      summary: Standort aktualisieren
      operationId: updateLocation
      tags:
        - Locations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdate'
      responses:
        '200':
          description: Standort erfolgreich aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          description: Standort nicht gefunden
        '400':
          description: Ungültige Eingabedaten
    delete:
      summary: Standort löschen
      operationId: deleteLocation
      tags:
        - Locations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Standort erfolgreich gelöscht
        '404':
          description: Standort nicht gefunden
  /members:
    get:
      summary: Mitglieder abrufen (optional nach Standort filtern)
      operationId: getMembers
      tags:
        - Members
      parameters:
        - name: locationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter nach Standort-ID
      responses:
        '200':
          description: Liste aller Mitglieder (optional gefiltert)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
    post:
      summary: Neues Mitglied erstellen
      operationId: createMember
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
      responses:
        '201':
          description: Mitglied erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Ungültige Eingabedaten
  /members/{id}:
    get:
      summary: Mitglied nach ID abrufen
      operationId: getMemberById
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Mitglied gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '404':
          description: Mitglied nicht gefunden
    put:
      summary: Mitglied aktualisieren
      operationId: updateMember
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdate'
      responses:
        '200':
          description: Mitglied erfolgreich aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '404':
          description: Mitglied nicht gefunden
        '400':
          description: Ungültige Eingabedaten
    delete:
      summary: Mitglied löschen
      operationId: deleteMember
      tags:
        - Members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Mitglied erfolgreich gelöscht
        '404':
          description: Mitglied nicht gefunden
components:
  schemas:
    Location:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: Name des Standorts (z.B. Hauptwache, Wache 2)
        address:
          type: string
          description: Adresse des Standorts
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
    LocationCreate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
      required:
        - name
    LocationUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
    Member:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        locationId:
          type: integer
          format: int64
          description: ID des zugewiesenen Standorts
        location:
          $ref: '#/components/schemas/Location'
          description: Vollständige Standort-Information (nur bei GET)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
    MemberCreate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        locationId:
          type: integer
          format: int64
          description: ID des zugewiesenen Standorts (optional)
      required:
        - firstName
        - lastName
        - email
    MemberUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        locationId:
          type: integer
          format: int64
          description: ID des zugewiesenen Standorts (optional)