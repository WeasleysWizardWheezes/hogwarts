paths:
  /api/v1/locations:
    get:
      tags: [Locations]
      summary: Alle Standorte auflisten
      operationId: listLocations
      parameters:
        - $ref: '../components/parameters/common.yaml#/PageParam'
        - $ref: '../components/parameters/common.yaml#/SizeParam'
        - $ref: '../components/parameters/common.yaml#/LocationTypeParam'
      responses:
        '200':
          description: Liste aller Standorte
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '../components/schemas/location.yaml#/LocationResponse'
                  page:
                    $ref: '../components/schemas/common.yaml#/PaginationMeta'
        '400':
          $ref: '../components/responses/errors.yaml#/BadRequest'
        '401':
          $ref: '../components/responses/errors.yaml#/Unauthorized'

    post:
      tags: [Locations]
      summary: Neuen Standort anlegen
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas/location.yaml#/CreateLocationRequest'
      responses:
        '201':
          description: Standort erstellt
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '../components/schemas/location.yaml#/LocationResponse'
        '400':
          $ref: '../components/responses/errors.yaml#/BadRequest'
        '401':
          $ref: '../components/responses/errors.yaml#/Unauthorized'
        '403':
          $ref: '../components/responses/errors.yaml#/Forbidden'
        '409':
          $ref: '../components/responses/errors.yaml#/Conflict'

  /api/v1/locations/{locationId}:
    get:
      tags: [Locations]
      summary: Standort anhand der ID laden
      operationId: getLocation
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Standort gefunden
          content:
            application/json:
              schema:
                $ref: '../components/schemas/location.yaml#/LocationResponse'
        '401':
          $ref: '../components/responses/errors.yaml#/Unauthorized'
        '404':
          $ref: '../components/responses/errors.yaml#/NotFound'

    put:
      tags: [Locations]
      summary: Standort vollständig aktualisieren
      operationId: updateLocation
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas/location.yaml#/UpdateLocationRequest'
      responses:
        '200':
          description: Standort aktualisiert
          content:
            application/json:
              schema:
                $ref: '../components/schemas/location.yaml#/LocationResponse'
        '400':
          $ref: '../components/responses/errors.yaml#/BadRequest'
        '401':
          $ref: '../components/responses/errors.yaml#/Unauthorized'
        '403':
          $ref: '../components/responses/errors.yaml#/Forbidden'
        '404':
          $ref: '../components/responses/errors.yaml#/NotFound'
        '409':
          $ref: '../components/responses/errors.yaml#/Conflict'

    delete:
      tags: [Locations]
      summary: Standort löschen
      operationId: deleteLocation
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Standort gelöscht
        '401':
          $ref: '../components/responses/errors.yaml#/Unauthorized'
        '403':
          $ref: '../components/responses/errors.yaml#/Forbidden'
        '404':
          $ref: '../components/responses/errors.yaml#/NotFound'
        '409':
          $ref: '../components/responses/errors.yaml#/Conflict'
