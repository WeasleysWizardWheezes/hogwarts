# PITest Configuration

targetClasses=de.thkoeln.ccq.firemanager.*
targetTests=de.thkoeln.ccq.firemanager.*

mutationThreshold=70

# Exclude certain mutations
mutexTimeout=10000

# Output formats
outputFormats=HTML,XML

timestampedReports=false

# Threads
threads=4

# Verbose logging
verbose=true

# History
historyInputFile=target/pit-reports/history.txt
historyOutputFile=target/pit-reports/history.txt
